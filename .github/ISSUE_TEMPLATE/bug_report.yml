name: Bug report
description: Report a reproducible problem in deployment, configuration, scripts, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, passwords, tokens, private IPs, and production identifiers before submitting.
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What happened?
      placeholder: Describe the deployment step, command, or document section that failed.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps that reproduces the problem.
      placeholder: |
        1. Edit ...
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share versions and topology details. Please redact sensitive values.
      value: |
        - OS:
        - MySQL release line: 8.0 / 8.4
        - Ansible version:
        - Inventory file:
        - Command:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs after redacting secrets.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else maintainers should know?
