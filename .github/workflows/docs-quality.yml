name: docs-quality

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - ".markdownlint-cli2.yaml"
      - ".yamllint.yml"
      - ".github/workflows/docs-quality.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - ".markdownlint-cli2.yaml"
      - ".yamllint.yml"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

jobs:
  advisory-lint:
    name: Advisory Markdown and YAML lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install YAML lint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Markdown lint
        run: npx --yes markdownlint-cli2

      - name: YAML lint
        run: yamllint .
