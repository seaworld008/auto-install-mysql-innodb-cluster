# Ansible Vault 密码文件示例
# 使用 ansible-vault encrypt 命令加密此文件
# 命令: ansible-vault encrypt examples/vault-secrets.yml

# MySQL密码配置示例。复制后请替换为真实强密码，并使用 ansible-vault 加密。
vault_mysql_root_password: "CHANGE_ME_ROOT_PASSWORD"
vault_mysql_cluster_password: "CHANGE_ME_CLUSTER_PASSWORD"
vault_mysql_replication_password: "CHANGE_ME_REPLICATION_PASSWORD"

# 其他敏感配置
vault_backup_encryption_key: "CHANGE_ME_BACKUP_ENCRYPTION_KEY"
vault_monitoring_api_key: "CHANGE_ME_MONITORING_API_KEY"

# 使用方法：
# 1. 加密文件: ansible-vault encrypt examples/vault-secrets.yml
# 2. 在playbook中引用: ansible-playbook --ask-vault-pass -e @examples/vault-secrets.yml playbooks/site.yml
# 3. 编辑加密文件: ansible-vault edit examples/vault-secrets.yml
