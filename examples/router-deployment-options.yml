# Router 部署选项示例
# 当前仓库主线推荐：
# - 独立 Router 集群
# - HAProxy VIP 暴露 3307/3308
# - Router 直连端口 6446/6447

recommended:
  description: "独立 Router 集群 + HAProxy/Keepalived"
  inventory: "inventory/hosts-with-dedicated-routers.yml"
  apply_command: "./scripts/deploy_dedicated_routers.sh --production-ready -i inventory/hosts-with-dedicated-routers.yml"
  connections:
    vip_rw: "mysql://user:password@192.168.1.100:3307/database"
    vip_ro: "mysql://user:password@192.168.1.100:3308/database"
    router_rw: "mysql://user:password@192.168.1.20:6446/database"
    router_ro: "mysql://user:password@192.168.1.20:6447/database"

optional_modes:
  colocated_router:
    description: "仅供资源受限环境参考，不是当前推荐主线"
  application_side_router:
    description: "仅供特定架构参考，不是当前推荐主线"
