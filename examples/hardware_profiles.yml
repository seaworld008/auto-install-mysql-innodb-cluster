# 硬件 profile 示例
# 当前仓库运行时只认 inventory/group_vars/all.yml 中的 mysql_config_profiles
# 这里仅给出 profile 选择与容量说明示例，不再维护独立运行配置

profiles:
  optimized_8c32g:
    mysql_hardware_profile: "optimized_8c32g"
    mysql_max_connections: 2500
    mysql_innodb_buffer_pool_size: "18G"
    suitable_for: "8核32G生产默认"

  original_10k:
    mysql_hardware_profile: "original_10k"
    mysql_max_connections: 10000
    mysql_innodb_buffer_pool_size: "24G"
    suitable_for: "历史高连接场景，仅在明确容量评估后使用"

usage_examples:
  switch_profile:
    command: "./scripts/config_manager.sh --switch optimized_8c32g"
  apply_profile:
    command: "./scripts/deploy_dedicated_routers.sh --apply-config -i inventory/hosts-with-dedicated-routers.yml"
  backup:
    command: "./scripts/deploy_dedicated_routers.sh --backup -i inventory/hosts-with-dedicated-routers.yml"
